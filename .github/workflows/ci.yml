name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Driver unit tests
        run: pnpm --filter @pi-gui/pi-sdk-driver test

      - name: Verify install copy
        run: pnpm verify:install-copy

  website-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @pi-gui/website run build

  desktop-core:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Desktop Core
        run: pnpm --filter @pi-gui/desktop run test:e2e:ci:mac

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-core-test-results
          path: apps/desktop/test-results/
          retention-days: 7
          if-no-files-found: ignore

  desktop-core-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Desktop Core (Windows)
        run: pnpm --filter @pi-gui/desktop run test:e2e:ci:windows

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-core-windows-test-results
          path: apps/desktop/test-results/
          retention-days: 7
          if-no-files-found: ignore

  desktop-package-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package Linux AppImage
        run: pnpm --filter @pi-gui/desktop run package:linux

      - name: Verify packaged runtime dependencies
        run: pnpm --dir apps/desktop run verify:packaged-runtime-deps:linux

  desktop-package-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package Windows directory
        run: pnpm --filter @pi-gui/desktop run package:win:dir

      - name: Verify packaged runtime dependencies
        run: pnpm --dir apps/desktop run verify:packaged-runtime-deps:windows
